name = "zivo-travel"
main = "cloudflare/worker.ts"
compatibility_date = "2026-05-23"
workers_dev = true
preview_urls = false

[[routes]]
pattern = "zivostravel.com/*"
zone_name = "zivostravel.com"

[[routes]]
pattern = "www.zivostravel.com/*"
zone_name = "zivostravel.com"

[assets]
directory = "./dist"
binding = "ASSETS"
not_found_handling = "single-page-application"
run_worker_first = true

[vars]
ZIVO_PLATFORM_ORIGIN = "https://zivosmedia.com"
